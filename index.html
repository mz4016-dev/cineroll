<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineRoll — Camera Roll App</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="workspace-container">

  <!-- ── CAMERA ── -->
  <div class="camera-wrapper">
    <div class="compact-camera">
      <div class="camera-body">

        <div class="screen-side">
          <div class="lcd-screen-panel">
            <input type="file" id="fileInput" multiple accept="image/*" style="display:none">
            <div id="lcdContent" style="width:100%;height:360px;overflow:hidden;border-radius:4px;position:relative;flex-shrink:0;">
              <!-- Upload zone -->
              <div id="uploadZone">
                <div class="empty-screen">
                  <svg width="60" height="60" viewBox="0 0 24 24" fill="none" style="margin-bottom:12px">
                    <path d="M12 16V8M12 8l-3 3M12 8l3 3" stroke="#007aff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3" stroke="#007aff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                  <p>CLICK OR DRAG PHOTOS HERE</p>
                  <small>to attach pictures directly to the film tape</small>
                </div>
              </div>
              <!-- Live camera -->
              <div id="cameraView">
                <video id="liveVideo" autoplay playsinline muted></video>
                <canvas id="snapCanvas" style="display:none"></canvas>
                <div id="modeToggle">
                  <button class="mode-btn" id="photoModeBtn">PHOTO</button>
                  <button class="mode-btn" id="videoModeBtn">VIDEO</button>
                </div>
                <div id="recIndicator">● REC</div>
                <div id="camControls">
                  <button class="cam-ctrl-btn" id="switchCamBtn" title="Flip camera">⟳</button>
                  <button id="snapBtn"></button>
                  <button class="cam-ctrl-btn" id="closeCamBtn" title="Close">✕</button>
                </div>
              </div>

            <div id="slideshowOverlay">
                <img id="slideshowImg" src="" alt="" style="display:none">
                <video id="slideshowVideoEl" autoplay muted loop style="display:none"></video>
                <div id="slideshowCounter">1 / 1</div>
                <div id="slideshowControls">
                    <div class="ss-dots" id="ssDots"></div>
                </div>
            </div>
            </div>
          </div>
        </div>

        <div class="controls-side">
          <div class="control-row status-row">
            <!-- video camera icon -->
            <svg class="video-icon" width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M15 10l4.55-2.27A1 1 0 0121 8.76v6.48a1 1 0 01-1.45.89L15 14M3 8a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z" stroke="#8e8e93" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <button class="shutter-btn" id="shutterBtn" title="Open Camera"></button>
          </div>

          <div class="control-row">
            <button class="cam-btn play-btn" id="playBtn" title="Slideshow">
              <svg id="playIcon" width="12" height="12" viewBox="0 0 24 24" fill="#8e8e93"><path d="M5 3l14 9-14 9V3z"/></svg>
            </button>
          </div>

          <div class="dpad-container">
            <div class="nav-circle">
              <div class="nav-dir nav-up">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="#8e8e93"><path d="M13 2l7 18-7-3-7 3z"/></svg>
              </div>
              <button class="nav-dir nav-left" id="navLeft" style="background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="#8e8e93"><path d="M15 18l-6-6 6-6" stroke="#8e8e93" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
              </button>
              <button class="nav-center" id="navOk">OK</button>
              <button class="nav-dir nav-right" id="navRight" style="background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="#8e8e93"><path d="M9 18l6-6-6-6" stroke="#8e8e93" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
              </button>
              <button class="nav-dir nav-down" id="navDown" style="background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#8e8e93" stroke-width="2.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
              </button>
            </div>
          </div>

          <div class="control-row bottom-actions">
            <button class="cam-btn menu-btn" id="menuBtn">MENU</button>
            <button class="cam-btn delete-btn" id="clearAllBtn" title="Delete All">
              <!-- trash icon -->
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ff453a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
              </svg>
            </button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- ── FILM STRIP ── -->
  <div class="filmstrip-wrapper">
    <div class="film-strip">
      <div class="sprockets">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <div id="filmFramesContainer"></div>
      <div class="sprockets">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>
  </div>

</div>

<!-- ── DELETED BIN MODAL ── -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2>🗑 DELETED PHOTOS <span class="deleted-count" id="deletedCount">0</span></h2>
      <div class="modal-header-actions">
        <button class="modal-btn restore-all" id="restoreAllBtn">↩ Restore All</button>
        <button class="modal-btn clear-bin"   id="clearBinBtn">Empty Bin</button>
        <button class="modal-btn close-btn"   id="closeModalBtn">✕ Close</button>
      </div>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>


<!-- ── Apply Filter  ── -->
<div class="filter-modal-overlay" id="filterModalOverlay">
  <div class="filter-modal">
    <h3>🎨 APPLY FILTER <button id="filterModalClose">✕</button></h3>
    <img id="filterPreview" class="filter-preview" src="" alt="Preview">
    <div class="filter-grid" id="filterGrid"></div>
    <button class="filter-apply-btn" id="filterApplyBtn">Apply Filter</button>
  </div>
</div>

<!-- ── LIGHTBOX ── -->
<div class="lightbox-overlay" id="lightboxOverlay">
  <div class="lightbox-inner">
    <button class="lightbox-close" id="lightboxClose">✕</button>
    <img  id="lightboxPhoto" src="" alt="" style="display:none">
    <video id="lightboxVideo" controls style="display:none"></video>
    <p class="lightbox-hint" id="lightboxHint"></p>
  </div>
</div>


</body>
<script src="script.js"></script>
</html>
